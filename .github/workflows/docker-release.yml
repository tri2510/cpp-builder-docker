name: Docker Image Release

# Trigger on release tags (e.g., v1.0.0, v2.1.3)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # Allow manual trigger

env:
  # Image name (change to your Docker Hub username or use GHCR)
  IMAGE_NAME: cpp-builder
  # GitHub Container Registry (works with GitHub token - no setup needed!)
  REGISTRY: ghcr.io
  # To use Docker Hub instead:
  # REGISTRY: docker.io
  # IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cpp-builder

jobs:
  # Build and push native image (amd64)
  build-native:
    name: Build Native Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push native image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push cross-compiler image (multi-arch)
  build-cross:
    name: Build Cross-Compiler Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-cross
            type=semver,pattern={{major}}.{{minor}},suffix=-cross
            type=semver,pattern={{major}},suffix=-cross
            type=raw,value=cross,enable={{is_default_branch}}

      - name: Build and push cross-compiler image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cross
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub Release with binaries
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-native, build-cross]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release Summary
        run: |
          cat > release_notes.md << 'EOF'
          ## C++ Builder Docker ${{ steps.version.outputs.VERSION }}

          ### Docker Images

          **Native (amd64 only, ~700MB):**
          ```bash
          docker pull ghcr.io/${{ github.repository_owner }}/cpp-builder:${{ steps.version.outputs.VERSION }}
          docker pull ghcr.io/${{ github.repository_owner }}/cpp-builder:latest
          ```

          **Cross-Compiler (amd64/arm64/armv7, ~1.3GB):**
          ```bash
          docker pull ghcr.io/${{ github.repository_owner }}/cpp-builder:${{ steps.version.outputs.VERSION }}-cross
          docker pull ghcr.io/${{ github.repository_owner }}/cpp-builder:cross
          ```

          ### Quick Start

          ```bash
          # Native build
          docker run --rm \
            -v $(pwd)/project:/project/src:ro \
            -v $(pwd)/output:/project/output \
            ghcr.io/${{ github.repository_owner }}/cpp-builder:latest

          # Cross-compile for ARM64
          docker run --rm \
            -v $(pwd)/project:/project/src:ro \
            -v $(pwd)/output:/project/output \
            -e TARGET=arm64 \
            ghcr.io/${{ github.repository_owner }}/cpp-builder:cross
          ```

          ### What's Changed

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          EOF

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
